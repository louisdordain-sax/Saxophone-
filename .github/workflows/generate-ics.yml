name: Générer le calendrier ICS

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ics:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Générer le fichier calendar.ics
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: node generate-ics.js

      - name: Pousser le fichier calendar.ics sur GitHub Pages
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add calendar.ics
          git diff --staged --quiet || git commit -m "🗓 Mise à jour automatique du calendrier ICS"
          git push
